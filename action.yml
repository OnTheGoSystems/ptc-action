name: 'PTC Translate'
description: 'Translate source files with Private Translation Cloud (WPML) and optionally open a pull request with the results.'
author: 'OnTheGoSystems'
branding:
  icon: 'globe'
  color: 'blue'

inputs:
  api-token:
    description: 'PTC project API token. Pass ${{ secrets.PTC_API_TOKEN }}. Sent to PTC via the PTC_API_TOKEN env var only — never on the command line.'
    required: true
  config-file:
    description: 'Path to .ptc-config.yml (recommended — generate it once with `ptc init`). Takes precedence over source-locale/patterns.'
    required: false
    default: ''
  source-locale:
    description: 'Source language code (e.g. "en"). Use together with `patterns` when you are not using a config file.'
    required: false
    default: ''
  patterns:
    description: 'Comma-separated glob(s) where {{lang}} marks the language slot, e.g. "src/locales/{{lang}}.json".'
    required: false
    default: ''
  file-tag-name:
    description: 'PTC file tag (branch-scoped batch). Defaults to git-branch auto-detect inside the CLI.'
    required: false
    default: ''
  monitor-interval:
    description: 'Seconds between translation-status polls. CLI default is 5. Raise it on large projects to poll less often.'
    required: false
    default: ''
  monitor-max-attempts:
    description: 'How many times to poll before giving up. CLI default is 100, i.e. ~8 minutes at the default interval — a run that needs longer exits 1 with the unfinished files listed, so raise this for big projects.'
    required: false
    default: ''
  api-url:
    description: 'PTC API base URL. Override only for staging / self-hosted.'
    required: false
    default: 'https://app.ptc.wpml.org/api/v1/'
  project-dir:
    description: 'Directory the CLI treats as the project root.'
    required: false
    default: '.'
  create-pr:
    description: 'If "true", open (or update) a pull request with the translations. Requires the "Allow GitHub Actions to create and approve pull requests" org/repo setting.'
    required: false
    default: 'false'
  pr-token:
    description: 'Token used to open the PR. Leave empty to use GITHUB_TOKEN; supply a PAT or GitHub App token so the translation PR triggers your downstream CI (GITHUB_TOKEN-opened PRs do not). Composite-action input defaults cannot evaluate ${{ github.token }}, so the fallback happens in the step.'
    required: false
    default: ''
  pr-branch:
    description: 'Stable branch the translation PR is pushed to. Re-runs update the SAME PR instead of spawning new ones (loop-safe).'
    required: false
    default: 'ptc/translations'

outputs:
  pr-number:
    description: 'The pull request number, when create-pr=true and there were changes.'
    value: ${{ steps.cpr.outputs.pull-request-number }}
  pr-url:
    description: 'The pull request URL, when create-pr=true and there were changes.'
    value: ${{ steps.cpr.outputs.pull-request-url }}

runs:
  using: 'composite'
  steps:
    - name: Validate inputs
      shell: bash
      run: |
        set -euo pipefail
        if [ -z "${{ inputs.config-file }}" ] && { [ -z "${{ inputs.source-locale }}" ] || [ -z "${{ inputs.patterns }}" ]; }; then
          echo "::error::Provide either 'config-file' OR both 'source-locale' and 'patterns'."
          exit 1
        fi

    - name: Translate with PTC
      id: ptc
      shell: bash
      working-directory: ${{ inputs.project-dir }}
      env:
        PTC_API_TOKEN: ${{ inputs.api-token }}   # token via env, never argv
      run: |
        set -euo pipefail
        echo "::add-mask::${PTC_API_TOKEN}"
        CLI="${{ github.action_path }}/ptc-cli.sh"   # vendored + pinned at v1.0.0, never curled at runtime
        chmod +x "$CLI"
        args=( --api-url "${{ inputs.api-url }}" )
        [ -n "${{ inputs.config-file }}" ]   && args+=( --config-file "${{ inputs.config-file }}" )
        [ -n "${{ inputs.source-locale }}" ] && args+=( --source-locale "${{ inputs.source-locale }}" )
        [ -n "${{ inputs.patterns }}" ]      && args+=( --patterns "${{ inputs.patterns }}" )
        [ -n "${{ inputs.file-tag-name }}" ] && args+=( --file-tag-name "${{ inputs.file-tag-name }}" )
        [ -n "${{ inputs.monitor-interval }}" ]     && args+=( --monitor-interval "${{ inputs.monitor-interval }}" )
        [ -n "${{ inputs.monitor-max-attempts }}" ] && args+=( --monitor-max-attempts "${{ inputs.monitor-max-attempts }}" )
        "$CLI" "${args[@]}"

    - name: Create/update translation pull request
      id: cpr
      if: ${{ inputs.create-pr == 'true' }}
      # Pinned to a full commit SHA, not a floating major tag: a mutable tag on a
      # third-party action is a write-access foothold in every consumer's repo.
      # v8 needs Actions Runner >= v2.327.1 (Node 24) on self-hosted runners.
      uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
      with:
        token: ${{ inputs.pr-token != '' && inputs.pr-token || github.token }}
        branch: ${{ inputs.pr-branch }}
        base: ${{ github.ref_name }}
        title: 'Update translations from PTC'
        commit-message: 'chore(i18n): update translations via PTC [skip translations]'
        body: |
          Automated translations produced by the **PTC Translate** action.

          - Source: `${{ github.sha }}`
          - Re-runs update this same PR.
        delete-branch: true
        add-paths: '.'
