# PTC Translate — GitLab CI/CD Catalog component.
#
# Usage (in your .gitlab-ci.yml):
#   include:
#     - component: $CI_SERVER_FQDN/OnTheGoSystems/ptc-action/translate@1
#       inputs:
#         config-file: .ptc-config.yml
#
# Store the token as a MASKED CI/CD variable named PTC_API_TOKEN
# (Settings → CI/CD → Variables). It is never placed on the command line.

spec:
  inputs:
    stage:
      default: deploy
    config-file:
      default: '.ptc-config.yml'
    source-locale:
      default: ''
    patterns:
      default: ''
    api-url:
      default: 'https://app.ptc.wpml.org/api/v1/'
    file-tag-name:
      default: ''
    monitor-interval:
      description: 'Seconds between translation-status polls. CLI default is 5.'
      default: ''
    monitor-max-attempts:
      description: 'How many polls before giving up. CLI default is 100 (~8 min at the default interval); a run that needs longer exits 1 with the unfinished files listed.'
      default: ''
    cli-ref:
      description: 'ptc-cli git ref to fetch. Defaults to the immutable commit behind v1.0.0 — a tag can be moved, a commit cannot.'
      default: '013883c2d1a1cf1a041be36b57237cd870d1f1a4'
    cli-sha256:
      description: 'Expected sha256 of ptc-cli.sh. Verified after download; set to an empty string to skip (only if you also override cli-ref).'
      default: '10d995c23c5ab31d74283716a5c50a81bf073839503e3e882668bbf5dbe6fd88'
    open-mr:
      description: 'Open a merge request with the translations via the git push option.'
      default: 'false'
    mr-target-branch:
      default: '$CI_DEFAULT_BRANCH'
---

"ptc-translate":
  stage: $[[ inputs.stage ]]
  image: alpine:3.22
  # Loop-safe: only on a push to the default branch, and never on a translation commit.
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_COMMIT_MESSAGE !~ /\[skip translations\]/'
  variables:
    PTC_CLI_URL: "https://raw.githubusercontent.com/OnTheGoSystems/ptc-cli/$[[ inputs.cli-ref ]]/ptc-cli.sh"
  before_script:
    - apk add --no-cache bash curl git jq
  script:
    # Fetched at an immutable commit and checksum-verified, because a GitLab
    # component ships YAML only - it cannot vendor a sibling file the way the
    # GitHub composite action does.
    - |
      set -eu
      curl -fsSL "$PTC_CLI_URL" -o ptc-cli.sh
      expected_sha="$[[ inputs.cli-sha256 ]]"
      if [ -n "$expected_sha" ]; then
        echo "$expected_sha  ptc-cli.sh" | sha256sum -c -
      else
        echo "WARNING: cli-sha256 is empty - ptc-cli.sh is not being verified."
      fi
      chmod +x ptc-cli.sh
    # POSIX positional parameters, not bash arrays: alpine ships busybox ash and
    # has no /bin/bash until before_script installs it, so this block has to run
    # under either shell. ptc-cli.sh itself is #!/bin/bash and gets bash via apk.
    - |
      set -eu
      set -- --api-url "$[[ inputs.api-url ]]"
      [ -n "$[[ inputs.config-file ]]" ]   && set -- "$@" --config-file "$[[ inputs.config-file ]]"
      [ -n "$[[ inputs.source-locale ]]" ] && set -- "$@" --source-locale "$[[ inputs.source-locale ]]"
      [ -n "$[[ inputs.patterns ]]" ]      && set -- "$@" --patterns "$[[ inputs.patterns ]]"
      [ -n "$[[ inputs.file-tag-name ]]" ] && set -- "$@" --file-tag-name "$[[ inputs.file-tag-name ]]"
      [ -n "$[[ inputs.monitor-interval ]]" ]     && set -- "$@" --monitor-interval "$[[ inputs.monitor-interval ]]"
      [ -n "$[[ inputs.monitor-max-attempts ]]" ] && set -- "$@" --monitor-max-attempts "$[[ inputs.monitor-max-attempts ]]"
      ./ptc-cli.sh "$@"   # PTC_API_TOKEN comes from the masked CI/CD variable
    - |
      if [ "$[[ inputs.open-mr ]]" = "true" ] && ! git diff --quiet; then
        git config user.email "ci@ptc"
        git config user.name "PTC Translate"
        git checkout -B ptc/translations
        git add -A
        git commit -m "chore(i18n): update translations via PTC [skip translations]"
        git push -o merge_request.create \
                 -o merge_request.target="$[[ inputs.mr-target-branch ]]" \
                 -o merge_request.title="Update translations from PTC" \
                 -f "https://gitlab-ci-token:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git" HEAD:ptc/translations
      fi
